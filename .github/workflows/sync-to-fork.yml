name: Sync to personal fork

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to personal fork
        env:
          FORK_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          git remote add fork https://x-access-token:${FORK_TOKEN}@github.com/JaeHyun10-03/basic-project-apppang-18th-team3-frontend.git
          git push fork main --force
